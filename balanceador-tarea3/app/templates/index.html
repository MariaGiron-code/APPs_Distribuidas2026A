<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Provincias del Ecuador</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { padding: 12px 20px; background: #1d3557; color: white; }
        #map { height: 85vh; width: 100%; }
        .badge { font-size: 13px; opacity: 0.8; }
    </style>
</head>
<body>
    <header>
        <h2 style="margin:0;">Mapa de provincias del Ecuador</h2>
        <span class="badge">Atendido por: {{ servidor }}</span>
    </header>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script id="provincias-data" type="application/json">{{ provincias | tojson }}</script>

    <script>
        const provincias = JSON.parse(document.getElementById('provincias-data').textContent);

        const map = L.map('map').setView([-1.83, -78.18], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        provincias.forEach(function (p) {
            L.marker([p.latitud, p.longitud])
                .addTo(map)
                .bindPopup(
                    `<b>${p.nombre}</b><br>` +
                    `Capital: ${p.capital}<br>` +
                    `Área: ${p.area_km2.toLocaleString()} km²<br>` +
                    `Población: ${p.poblacion.toLocaleString()}`
                );
        });
    </script>
</body>
</html>
